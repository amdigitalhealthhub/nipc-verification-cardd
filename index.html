<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration Certificate Status</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <img src="https://swip.nipc.gov.ng/assets/images/logo.png" alt="NIPC Logo" class="logo" onerror="this.src='logo.jpg'">
        </div>
    </header>

    <div class="sub-header">
        <p>NIPC Business Registration Certificate Status</p>
    </div>

    <main class="main-container">
        
        <div class="status-card">
            <h2 class="company-name">SKYGREEN ENERGY</h2>
            
            <div class="info-group">
                <span class="label">BN NUMBER</span>
                <span class="value text-muted">9670759</span>
            </div>

            <div class="info-group">
                <span class="label">ISSUED DATE</span>
                <span class="value">27-Feb-2026</span>
            </div>

            <div class="info-group">
                <span class="label">EXPIRATION DATE</span>
                <span class="value">26-Feb-2027</span>
            </div>

            <div class="info-group">
                <span class="label">STATUS</span>
                <span class="badge badge-active">Active</span>
            </div>
        </div>

    </main>

    <footer class="footer-wrapper">
        <div class="footer-links">
            <div class="footer-column">
                <h3>RESOURCES</h3>
                <a href="#">Invest in Nigeria</a>
            </div>
            <div class="footer-column">
                <h3>LEGAL</h3>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
            </div>
        </div>
        
        <div class="footer-bottom">
            <span>© 2026 Nigerian Investment Promotion Commission</span>
            <span>Powered by oobazee</span>
        </div>
    </footer>

</body>
</html>
